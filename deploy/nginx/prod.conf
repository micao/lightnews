upstream django_app {
    server web:8000;
}

# HTTP: 监听 80 端口，除 Certbot 验证请求外全部重定向至 HTTPS
server {
    listen 80;
    server_name lightinthebrain.com www.lightinthebrain.com;

    # Certbot 验证通道
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: 监听 443 端口并应用 SSL 证书
server {
    listen 443 ssl;
    server_name lightinthebrain.com www.lightinthebrain.com;

    # SSL 证书配置路径（Let's Encrypt 证书目录）
    ssl_certificate /etc/letsencrypt/live/lightinthebrain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lightinthebrain.com/privkey.pem;

    # SSL 安全增强配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 20M;

    # 1. 前端单页面应用 (SPA) 静态资源
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. 后端 API、Swagger 与 Django 管理后台
    location ~ ^/(api|admin|swagger)(/|$) {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }


    # 3. 收集到的 Django 静态文件
    location /static/ {
        alias /code/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. 用户上传的媒体文件
    location /media/ {
        alias /code/mediafiles/;
    }
}
