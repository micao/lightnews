services:
  db:
    image: postgres:15-alpine
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT_EXPOSE}:5432"

  web:
    build:
      context: .
      dockerfile: ./deploy/app/Dockerfile
    # 开发环境会挂载代码，实现热重载；生产环境直接运行容器内打包好的代码
    volumes:
      - .:/code
      - ./staticfiles:/code/staticfiles
      - ./mediafiles:/code/mediafiles
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    # entrypoint 会根据环境变量自动切换启动开发服务器或 Gunicorn
    entrypoint: ["/code/deploy/app/entrypoint.sh"]

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./deploy/nginx/${NGINX_CONFIG}:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/code/staticfiles
      - ./mediafiles:/code/mediafiles
    ports:
      - "${WEB_PORT_EXPOSE}:80"
    depends_on:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"

# no global volumes needed
